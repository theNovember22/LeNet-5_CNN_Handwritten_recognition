<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MNIST Digit Recognition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: dark;
        --bg: #07090c;
        --panel: #0e1319;
        --panel-2: #121922;
        --panel-3: #171f2a;
        --ink: #f7fafc;
        --muted: #95a3b4;
        --soft: #c9d3df;
        --line: rgba(207, 218, 230, 0.14);
        --line-strong: rgba(207, 218, 230, 0.28);
        --accent: #24d3b5;
        --accent-2: #15a991;
        --accent-soft: rgba(36, 211, 181, 0.14);
        --danger: #ff6b6b;
        --shadow: 0 34px 100px rgba(0, 0, 0, 0.46);
        --radius-xl: 34px;
        --radius-lg: 26px;
        --radius-md: 20px;
        --radius-sm: 14px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(135deg, #090c11 0%, #0d141b 46%, #07090c 100%);
        background-size: 34px 34px, 34px 34px, auto;
      }

      .app-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(14px, 2.4vw, 28px);
      }

      .workspace {
        width: min(1180px, 100%);
        min-height: min(760px, calc(100svh - 56px));
        display: grid;
        grid-template-columns: minmax(330px, 0.78fr) minmax(560px, 1.22fr);
        overflow: hidden;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.055), transparent 120px),
          var(--panel);
        box-shadow: var(--shadow);
      }

      .upload-panel,
      .result-panel,
      .preview-stack,
      .prediction,
      .probabilities {
        min-width: 0;
      }

      .upload-panel {
        display: grid;
        grid-template-rows: auto 1fr auto auto;
        gap: 22px;
        padding: clamp(22px, 3vw, 34px);
        border-right: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(36, 211, 181, 0.09), transparent 34%),
          #0b1016;
      }

      .eyebrow {
        width: fit-content;
        margin: 0 0 16px;
        padding: 7px 10px;
        border: 1px solid rgba(36, 211, 181, 0.35);
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        max-width: 430px;
        margin: 0;
        color: var(--ink);
        font-size: clamp(2.45rem, 5vw, 4.8rem);
        line-height: 0.9;
        font-weight: 900;
      }

      .intro {
        max-width: 390px;
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.55;
      }

      .drop-zone {
        position: relative;
        min-height: clamp(220px, 30vh, 270px);
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 10px;
        padding: 30px;
        border: 1px dashed rgba(36, 211, 181, 0.62);
        border-radius: var(--radius-lg);
        background:
          linear-gradient(135deg, rgba(36, 211, 181, 0.12), transparent 42%),
          rgba(255, 255, 255, 0.035);
        color: var(--muted);
        cursor: pointer;
        text-align: center;
        isolation: isolate;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
      }

      .drop-zone::before {
        content: "";
        width: 58px;
        height: 58px;
        margin-bottom: 10px;
        border: 1px solid rgba(36, 211, 181, 0.42);
        border-radius: 18px;
        background:
          linear-gradient(var(--accent), var(--accent)) center 18px / 22px 3px no-repeat,
          linear-gradient(var(--accent), var(--accent)) center 18px / 3px 22px no-repeat,
          rgba(36, 211, 181, 0.1);
      }

      .drop-zone::after {
        content: "";
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: calc(var(--radius-lg) - 8px);
        pointer-events: none;
      }

      .drop-zone:hover {
        transform: translateY(-3px);
        border-color: var(--accent);
        background:
          linear-gradient(135deg, rgba(36, 211, 181, 0.19), transparent 44%),
          rgba(255, 255, 255, 0.055);
        box-shadow: 0 22px 46px rgba(36, 211, 181, 0.12);
      }

      .drop-zone:active {
        transform: translateY(-1px);
      }

      .drop-zone input {
        display: none;
      }

      .drop-title {
        display: block;
        color: var(--ink);
        font-size: 1.2rem;
        font-weight: 850;
      }

      .drop-hint {
        color: var(--muted);
        font-size: 0.93rem;
        font-weight: 650;
      }

      button {
        width: 100%;
        height: 56px;
        border: 0;
        border-radius: 18px;
        background: var(--accent);
        color: #05100e;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 18px 36px rgba(36, 211, 181, 0.18);
        transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-2px);
        background: #49e0c8;
        box-shadow: 0 24px 48px rgba(36, 211, 181, 0.24);
      }

      button:active:not(:disabled) {
        transform: translateY(0);
      }

      button:disabled {
        background: #33414e;
        color: #8f9ca8;
        cursor: not-allowed;
        box-shadow: none;
      }

      .status {
        min-height: 24px;
        margin: 0;
        color: var(--danger);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .result-panel {
        display: grid;
        grid-template-columns: minmax(238px, 0.75fr) minmax(320px, 1fr);
        grid-template-rows: minmax(340px, auto) 1fr;
        gap: 22px;
        padding: clamp(18px, 2.4vw, 26px);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 180px),
          var(--panel);
      }

      .preview-stack {
        display: grid;
        gap: 16px;
      }

      .preview-stack > div,
      .prediction,
      .probabilities {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.035);
      }

      .preview-stack > div {
        padding: 14px;
      }

      .preview-stack .label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .preview-stack .label::after {
        content: "32x32";
        color: rgba(149, 163, 180, 0.72);
        font-size: 0.66rem;
        font-weight: 700;
      }

      .preview-stack > div:first-child .label::after {
        content: "Source";
      }

      .preview-box {
        width: 100%;
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius-md);
        background:
          linear-gradient(45deg, rgba(255, 255, 255, 0.025) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(255, 255, 255, 0.025) 25%, transparent 25%),
          #070b10;
        background-size: 18px 18px;
        color: #657281;
        overflow: hidden;
      }

      .processed-box {
        image-rendering: pixelated;
      }

      .preview-box img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .preview-box img:not([src]) {
        display: none;
      }

      .prediction {
        position: relative;
        min-height: 340px;
        display: grid;
        align-content: center;
        justify-items: start;
        padding: 32px;
        overflow: hidden;
        background:
          linear-gradient(135deg, rgba(36, 211, 181, 0.14), transparent 52%),
          rgba(255, 255, 255, 0.04);
      }

      .prediction::after {
        content: "";
        position: absolute;
        right: -42px;
        bottom: -68px;
        width: 220px;
        height: 220px;
        border: 1px solid rgba(36, 211, 181, 0.16);
        border-radius: 52px;
        transform: rotate(14deg);
      }

      .label {
        color: var(--muted);
        font-size: 0.7rem;
        font-weight: 850;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .prediction strong {
        position: relative;
        z-index: 1;
        display: block;
        margin: 12px 0 14px;
        color: var(--ink);
        font-size: clamp(8rem, 17vw, 15rem);
        line-height: 0.76;
        font-weight: 900;
        animation: result-rise 360ms ease both;
      }

      #confidence {
        position: relative;
        z-index: 1;
        padding: 9px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 1.02rem;
        font-weight: 850;
      }

      .probabilities {
        grid-column: 1 / -1;
        display: grid;
        align-self: stretch;
        gap: 8px;
        padding: 18px;
      }

      .probability-row {
        display: grid;
        grid-template-columns: 30px minmax(0, 1fr) 78px;
        align-items: center;
        gap: 12px;
        min-height: 30px;
        color: var(--ink);
        font-size: 0.92rem;
      }

      .probability-row span,
      .probability-row strong {
        font-weight: 850;
      }

      .probability-row span {
        color: var(--soft);
      }

      .probability-row strong {
        color: var(--muted);
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .bar {
        height: 11px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(201, 211, 223, 0.13);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.035);
      }

      .bar i {
        display: block;
        height: 100%;
        min-width: 2px;
        border-radius: inherit;
        background: var(--accent-2);
        transition: width 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .probability-row:has(i[style^="width: 4"]) .bar,
      .probability-row:has(i[style^="width: 5"]) .bar,
      .probability-row:has(i[style^="width: 6"]) .bar,
      .probability-row:has(i[style^="width: 7"]) .bar,
      .probability-row:has(i[style^="width: 8"]) .bar,
      .probability-row:has(i[style^="width: 9"]) .bar,
      .probability-row:has(i[style^="width: 100"]) .bar {
        height: 16px;
        background: rgba(36, 211, 181, 0.12);
      }

      .probability-row:has(i[style^="width: 4"]) i,
      .probability-row:has(i[style^="width: 5"]) i,
      .probability-row:has(i[style^="width: 6"]) i,
      .probability-row:has(i[style^="width: 7"]) i,
      .probability-row:has(i[style^="width: 8"]) i,
      .probability-row:has(i[style^="width: 9"]) i,
      .probability-row:has(i[style^="width: 100"]) i {
        background: var(--accent);
      }

      .probability-row:has(i[style^="width: 4"]) strong,
      .probability-row:has(i[style^="width: 5"]) strong,
      .probability-row:has(i[style^="width: 6"]) strong,
      .probability-row:has(i[style^="width: 7"]) strong,
      .probability-row:has(i[style^="width: 8"]) strong,
      .probability-row:has(i[style^="width: 9"]) strong,
      .probability-row:has(i[style^="width: 100"]) strong {
        color: var(--accent);
      }

      @keyframes result-rise {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 1120px) {
        .app-shell {
          padding: 16px;
          place-items: start center;
        }

        .workspace {
          min-height: auto;
          grid-template-columns: 1fr;
          border-radius: 28px;
        }

        .upload-panel {
          grid-template-columns: minmax(280px, 0.9fr) minmax(280px, 1.1fr);
          grid-template-rows: auto auto;
          align-items: stretch;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .upload-panel > div:first-child {
          align-self: center;
        }

        .drop-zone {
          min-height: 220px;
          grid-row: span 2;
        }

        button,
        .status {
          grid-column: 1;
        }

        .result-panel {
          grid-template-columns: minmax(220px, 0.72fr) minmax(320px, 1fr);
          grid-template-rows: auto;
        }

        .preview-stack {
          grid-template-columns: 1fr;
        }

        .probabilities {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 760px) {
        .upload-panel {
          grid-template-columns: 1fr;
          grid-template-rows: auto;
        }

        .drop-zone {
          grid-row: auto;
        }

        button,
        .status {
          grid-column: auto;
        }

        .result-panel {
          grid-template-columns: 1fr;
        }

        .preview-stack {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .prediction {
          min-height: 240px;
        }

        .prediction strong {
          font-size: clamp(7rem, 28vw, 10rem);
        }
      }

      @media (max-width: 560px) {
        .app-shell {
          padding: 10px;
        }

        .workspace {
          border-radius: 24px;
        }

        .upload-panel,
        .result-panel {
          padding: 18px;
        }

        .preview-stack {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: clamp(2.2rem, 13vw, 3.25rem);
        }

        .intro {
          font-size: 0.94rem;
        }

        .drop-zone {
          min-height: 190px;
          padding: 22px;
        }

        .prediction {
          min-height: 220px;
          padding: 24px;
        }

        .probability-row {
          grid-template-columns: 22px minmax(0, 1fr) 66px;
          gap: 8px;
          font-size: 0.84rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <div class="upload-panel">
          <div>
            <p class="eyebrow">TensorFlow CNN</p>
            <h1>Digit Vision Lab</h1>
            <p class="intro">Upload one handwritten digit. The model preprocesses it into MNIST format and returns a confidence distribution across all ten classes.</p>
          </div>

          <label class="drop-zone" for="imageInput">
            <input id="imageInput" type="file" accept="image/*">
            <span class="drop-title">Drop or upload a digit</span>
            <span class="drop-hint">PNG, JPG, or JPEG</span>
          </label>

          <button id="predictButton" type="button" disabled>Predict Digit</button>
          <p id="status" class="status"></p>
        </div>

        <div class="result-panel">
          <div class="preview-stack">
            <div>
              <span class="label">Uploaded</span>
              <div class="preview-box">
                <img id="preview" alt="Uploaded digit preview">
                <span id="emptyPreview">Preview</span>
              </div>
            </div>

            <div>
              <span class="label">Model Input</span>
              <div class="preview-box processed-box">
                <img id="processedPreview" alt="Processed model input preview">
                <span id="emptyProcessedPreview">Processed</span>
              </div>
            </div>
          </div>

          <div class="prediction">
            <span class="label">Prediction</span>
            <strong id="digit">-</strong>
            <span id="confidence">Confidence: -</span>
          </div>

          <div class="probabilities" id="probabilities"></div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
