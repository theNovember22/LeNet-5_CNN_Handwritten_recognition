<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MNIST Digit Recognition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <div class="upload-panel">
          <div>
            <p class="eyebrow">TensorFlow CNN</p>
            <h1>Digit Vision Lab</h1>
            <p class="intro">Upload one handwritten digit. The model preprocesses it into MNIST format and returns a confidence distribution across all ten classes.</p>
          </div>

          <label class="drop-zone" for="imageInput" id="dropZone">
            <input id="imageInput" type="file" accept="image/*">
            <span class="upload-icon" aria-hidden="true"></span>
            <span class="drop-title">Drop or upload a digit</span>
            <span class="drop-hint">PNG, JPG, or JPEG</span>
            <span id="fileName" class="file-name">No file selected</span>
          </label>

          <button id="predictButton" type="button" disabled>
            <span class="button-label">Predict Digit</span>
          </button>
          <p id="status" class="status"></p>
        </div>

        <div class="result-panel">
          <div class="preview-zone">
            <div class="preview-card">
              <span class="label">Uploaded</span>
              <div class="preview-box">
                <img id="preview" alt="Uploaded digit preview">
                <span id="emptyPreview">Preview</span>
              </div>
            </div>

            <div class="preview-card">
              <span class="label">Model Input</span>
              <div class="preview-box processed-box">
                <img id="processedPreview" alt="Processed model input preview">
                <span id="emptyProcessedPreview">Processed</span>
              </div>
            </div>
          </div>

          <div class="prediction">
            <span class="label">Predicted Digit</span>
            <strong id="digit">-</strong>
            <span id="confidence">Confidence: -</span>
          </div>

          <div class="probabilities" id="probabilities"></div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
